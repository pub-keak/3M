<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A little something for you 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF4EA;
    --paper:#FFFBF4;
    --peach:#F6D9C0;
    --rose:#E08A6E;
    --rose-deep:#C96A4E;
    --plum:#7A3B47;
    --ink:#4A2C2E;
    --gold:#D9A86C;
    --shadow:rgba(122,59,71,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;min-height:100%}
  body{
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(120% 90% at 50% -10%, #FCE8D6 0%, var(--cream) 45%, #F3E4D2 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .stage{
    position:relative;width:100%;max-width:460px;
    height:100vh;height:100dvh;min-height:560px;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .6s ease;
  }
  .screen.active{opacity:1;pointer-events:auto}

  /* ---------- COUNTDOWN ---------- */
  #countdown .hint{
    font-family:'Caveat',cursive;font-size:30px;color:var(--rose-deep);
    margin-bottom:8px;letter-spacing:.5px;
  }
  #countdown .sub{font-size:14px;color:var(--plum);opacity:.75;margin-bottom:28px}
  .counter{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:128px;line-height:1;color:var(--plum);
    text-shadow:0 8px 24px var(--shadow);
  }
  .counter.pop{animation:pop .9s cubic-bezier(.2,.9,.2,1)}
  @keyframes pop{
    0%{transform:scale(.4);opacity:0}
    35%{transform:scale(1.08);opacity:1}
    70%{transform:scale(.98)}
    100%{transform:scale(1);opacity:.0}
  }

  /* ---------- ENVELOPE ---------- */
  .env-tap{font-family:'Caveat',cursive;font-size:26px;color:var(--rose-deep);margin-top:26px;
    animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  .envelope{
    position:relative;width:268px;height:182px;cursor:pointer;
    filter:drop-shadow(0 18px 30px var(--shadow));
    transition:transform .4s ease;
  }
  .envelope:active{transform:scale(.97)}
  .env-body{
    position:absolute;inset:0;border-radius:12px;
    background:linear-gradient(160deg,#F5E2CE,#E9CBAE);
    overflow:hidden;
  }
  .env-pocket{
    position:absolute;bottom:0;left:0;right:0;height:100%;
    background:linear-gradient(160deg,#F1D8BE,#E3BE9C);
    clip-path:polygon(0 32%,50% 100%,100% 32%,100% 100%,0 100%);
    z-index:3;
  }
  .env-flap{
    position:absolute;top:0;left:0;right:0;height:62%;
    background:linear-gradient(160deg,#F6E4D1,#EDD0B4);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;transition:transform .7s cubic-bezier(.6,.05,.2,1);
    z-index:5;backface-visibility:hidden;
  }
  .envelope.open .env-flap{transform:rotateX(180deg);z-index:1}
  .seal{
    position:absolute;top:46%;left:50%;width:46px;height:46px;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--rose),var(--rose-deep));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 10px rgba(122,59,71,.4);z-index:6;
    font-size:20px;transition:opacity .3s ease .1s;
  }
  .envelope.open .seal{opacity:0}
  .env-letter{
    position:absolute;left:8%;right:8%;top:14%;height:64%;
    background:var(--paper);border-radius:6px;z-index:4;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    transform:translateY(0);transition:transform .7s ease .25s;
    display:flex;align-items:center;justify-content:center;
    font-family:'Caveat',cursive;color:var(--rose);font-size:22px;
  }
  .envelope.open .env-letter{transform:translateY(-58%)}

  /* ---------- CARD ---------- */
  #card{justify-content:flex-start;overflow-y:auto;padding:38px 22px 60px}
  #card.active{pointer-events:auto}
  .card-inner{
    width:100%;max-width:400px;background:var(--paper);
    border-radius:22px;padding:30px 26px 34px;
    box-shadow:0 24px 60px var(--shadow),0 2px 0 #fff inset;
    border:1px solid rgba(217,168,108,.35);
    transform:translateY(40px) scale(.96);opacity:0;
  }
  #card.active .card-inner{animation:rise .9s cubic-bezier(.2,.85,.25,1) forwards}
  @keyframes rise{to{transform:translateY(0) scale(1);opacity:1}}

  .eyebrow{font-family:'Caveat',cursive;font-size:26px;color:var(--rose-deep);
    text-align:center;transform:rotate(-3deg)}
  .title{
    font-family:'Fraunces',serif;font-style:italic;font-weight:600;
    font-size:40px;line-height:1.04;text-align:center;color:var(--plum);
    margin:2px 0 6px;
  }
  .days{
    text-align:center;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--gold);font-weight:700;margin-bottom:20px;
  }
  .days b{color:var(--rose-deep)}
  .msg{font-size:15.5px;line-height:1.7;color:var(--ink);margin-bottom:6px}
  .msg p{margin-bottom:13px}
  .sign{font-family:'Caveat',cursive;font-size:27px;color:var(--rose-deep);
    text-align:right;margin-top:2px;transform:rotate(-1.5deg)}
  .forever{font-family:'Caveat',cursive;font-weight:700;
    font-size:30px;line-height:1;color:var(--rose-deep);text-align:center;
    margin:18px 0 6px;transform:rotate(-2deg)}

  .polas{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:24px 0 8px}
  .pola{
    background:#fff;padding:8px 8px 30px;border-radius:3px;
    box-shadow:0 8px 20px rgba(74,44,46,.18);
    width:138px;opacity:0;transform:translateY(20px) rotate(var(--rot,0deg));
  }
  #card.active .pola{animation:polaIn .7s ease forwards}
  #card.active .pola:nth-child(1){animation-delay:.5s}
  #card.active .pola:nth-child(2){animation-delay:.7s}
  #card.active .pola:nth-child(3){animation-delay:.9s}
  @keyframes polaIn{to{opacity:1;transform:translateY(0) rotate(var(--rot,0deg))}}
  .pola img{width:100%;height:150px;object-fit:cover;border-radius:1px;display:block;background:#eee}
  .pola .cap{font-family:'Caveat',cursive;font-size:16px;color:var(--ink);
    text-align:center;margin-top:7px;line-height:1.1}
  .pola.tall img{height:172px}

  .divider{display:flex;align-items:center;gap:10px;margin:20px 2px}
  .divider:before,.divider:after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--peach),transparent)}
  .divider span{color:var(--rose);font-size:14px}

  .replay{
    display:block;margin:26px auto 0;background:none;border:none;
    font-family:'Nunito';font-size:13px;color:var(--plum);opacity:.6;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;
  }
  .replay:hover{opacity:1}

  /* ambient hearts + confetti */
  .heart{position:absolute;font-size:18px;pointer-events:none;
    animation:float linear forwards;z-index:2;will-change:transform,opacity}
  @keyframes float{
    0%{transform:translateY(0) scale(.6);opacity:0}
    15%{opacity:.9}
    100%{transform:translateY(-115vh) scale(1.1) rotate(20deg);opacity:0}
  }
  .confetti{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;
    pointer-events:none;z-index:30;animation:fall ease-in forwards}
  @keyframes fall{
    0%{transform:translateY(0) rotate(0);opacity:1}
    100%{transform:translateY(112vh) rotate(720deg);opacity:.9}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s!important;transition-duration:.2s!important}
    .heart{display:none}
  }
</style>
</head>
<body>
<div class="stage" id="stage">

  <!-- COUNTDOWN -->
  <section class="screen active" id="countdown">
    <div class="hint">don't blink 👀</div>
    <div class="sub">something's coming for you...</div>
    <div class="counter" id="num">5</div>
  </section>

  <!-- ENVELOPE -->
  <section class="screen" id="envScreen">
    <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open your card">
      <div class="env-body"></div>
      <div class="env-letter">💌</div>
      <div class="env-pocket"></div>
      <div class="env-flap"></div>
      <div class="seal">❤️</div>
    </div>
    <div class="env-tap">Tap to open kub 🌳ruk</div>
  </section>

  <!-- CARD -->

      <div class="divider"><span>♡</span></div>
      <button class="replay" id="replay">play it again from the top ↺</button>
    </div>
  </section>

</div>

<script>
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stage = document.getElementById('stage');
  const screens = {
    countdown: document.getElementById('countdown'),
    env: document.getElementById('envScreen'),
    card: document.getElementById('card'),
  };
  function show(name){
    Object.values(screens).forEach(s=>s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  // ---- ambient hearts ----
  let heartTimer=null;
  function spawnHeart(){
    const h=document.createElement('div');
    h.className='heart';
    h.textContent=['💛','💗','✨','💕'][Math.floor(Math.random()*4)];
    h.style.left=Math.random()*100+'%';
    h.style.bottom='-20px';
    h.style.fontSize=(14+Math.random()*16)+'px';
    h.style.animationDuration=(6+Math.random()*5)+'s';
    stage.appendChild(h);
    setTimeout(()=>h.remove(),11000);
  }
  function startHearts(){ if(reduce)return; heartTimer=setInterval(spawnHeart,650); }

  // ---- confetti burst ----
  function confetti(){
    if(reduce)return;
    const colors=['#E08A6E','#D9A86C','#7A3B47','#F6D9C0','#C96A4E'];
    for(let i=0;i<46;i++){
      const c=document.createElement('div');
      c.className='confetti';
      c.style.left=Math.random()*100+'%';
      c.style.background=colors[i%colors.length];
      c.style.animationDuration=(2.4+Math.random()*1.8)+'s';
      c.style.animationDelay=(Math.random()*.4)+'s';
      c.style.width=(6+Math.random()*6)+'px';
      stage.appendChild(c);
      setTimeout(()=>c.remove(),5000);
    }
  }

  // ---- countdown ----
  const numEl=document.getElementById('num');
  function runCountdown(){
    show('countdown');
    let n=5;
    numEl.textContent=n; numEl.classList.add('pop');
    const tick=setInterval(()=>{
      n--;
      if(n<=0){
        clearInterval(tick);
        setTimeout(()=>{ show('env'); }, 350);
        return;
      }
      numEl.textContent=n;
      numEl.classList.remove('pop'); void numEl.offsetWidth; numEl.classList.add('pop');
    },1000);
  }

  // ---- envelope open ----
  const env=document.getElementById('envelope');
  function openCard(){
    if(env.classList.contains('open'))return;
    env.classList.add('open');
    confetti();
    setTimeout(()=>{ show('card'); startHearts(); }, 850);
  }
  env.addEventListener('click',openCard);
  env.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();openCard();} });

  // ---- replay ----
  document.getElementById('replay').addEventListener('click',()=>{
    clearInterval(heartTimer);
    document.querySelectorAll('.heart,.confetti').forEach(n=>n.remove());
    env.classList.remove('open');
    runCountdown();
  });

  runCountdown();
</script>
